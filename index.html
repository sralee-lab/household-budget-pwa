<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>우리 집 가계부</title>
<meta name="theme-color" content="#e8e2d2">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가계부">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <section id="screen-login">
    <div class="stamp">家計簿</div>
    <h1 class="login-title">매일 쓰는<br>우리 집 가계부</h1>
    <p class="login-sub">쓰던 구글 시트 그대로, 폰에서<br>한 줄만 빠르게 적으세요.</p>

    <div class="login-privacy">
      <b>나만 보는 가계부예요.</b> 구글 로그인을 하면 내 구글 드라이브에 나만의 가계부 사본이 자동으로 만들어지고, 이 앱을 만든 사람도 내용을 볼 수 없어요.
    </div>

    <button id="login-btn" class="btn-google" type="button">
      <svg class="g-logo" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.9 18.9 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.5 0 10.4-1.9 14.3-5.1l-6.6-5.6C29.6 35 26.9 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.6 5.1C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.8-2.8 5.1-5.2 6.7l6.6 5.6C39.9 37.6 44 31.5 44 24c0-1.3-.1-2.7-.4-3.5z"/></svg>
      Google 계정으로 시작하기
    </button>

    <p id="login-error" class="login-error" hidden></p>

    <div class="login-footer">구글 시트 기반 · 광고 없음 · 완전 무료</div>
  </section>

  <section id="screen-loading" hidden>
    <p id="loading-message">확인 중...</p>
  </section>

  <section id="screen-home" hidden>
    <div class="stamp">家計簿</div>
    <p id="home-status">로그인 완료</p>
    <p class="home-email" id="home-email"></p>
    <a id="sheet-link" class="btn-outline" href="#" target="_blank" rel="noopener" hidden>구글 시트에서 열기</a>
    <button id="logout-btn" class="btn-outline" type="button">로그아웃</button>
  </section>

</div>
<script type="module" src="js/app.js"></script>
</body>
</html>
